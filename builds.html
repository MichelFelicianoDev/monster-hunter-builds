<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHW Build FInder</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>MHW Build Finder</h1>
    <p>Encontre a build perfeita para a sua arma</p>

    <input type="text" id="busca" placeholder="Buscar por arma...">

    <div id="filtros-rank">
        <button class="btn-rank" data-rank="todos">Todos</button>
        <button class="btn-rank" data-rank="Baixo">Baixo</button>
        <button class="btn-rank" data-rank="Elevado">Elevado</button>
        <button class="btn-rank" data-rank="Mestre">Mestre</button>
    </div>

    <div id="lista-builds">

    </div>
    <script src="js/script.js"></script>
</body>
</html>
